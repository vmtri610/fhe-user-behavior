apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: jaeger-ingress
  namespace: tracing
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
spec:
  ingressClassName: "nginx"
  rules:
  - host: jaeger.userbehavior.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: jaeger-jaeger
            port:
              number: 16686
      - path: /otlp-http
        pathType: Prefix
        backend:
          service:
            name: jaeger-jaeger
            port:
              number: 4318
      - path: /otlp-grpc
        pathType: Prefix
        backend:
          service:
            name: jaeger-jaeger
            port:
              number: 4317
